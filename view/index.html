<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WarenWelt Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Unsere Produkte</h1>

    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text text-muted">{{ product.author }}</p>
                    <p class="fw-bold">{{ "%.2f"|format(product.price) }} EUR</p>
                    <button class="btn btn-success btn-sm">In den Warenkorb</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
