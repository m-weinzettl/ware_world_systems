<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - Waren Welt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .register-card { max-width: 500px; margin: 50px auto; }
        .hidden-fields { display: none; }
    </style>
</head>
<body class="bg-light">

    <div class="container">
        <div class="card register-card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h3 class="mb-0">Neues Konto erstellen</h3>
            </div>
            <div class="card-body p-4">

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form action="{{ url_for('user.register') }}" method="POST">

                    <div class="mb-3">
                        <label class="form-label">E-Mail Adresse</label>
                        <input type="email" name="email" class="form-control" required placeholder="beispiel@mail.de">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Passwort</label>
                        <input type="password" name="password" class="form-control" required placeholder="Mindestens 8 Zeichen">
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Kundentyp</label>
                        <select class="form-select border-primary" id="customerType" onchange="toggleFields()">
                            <option value="private">Privatperson</option>
                            <option value="company">Firma / Unternehmen</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" id="nameLabel">Vollständiger Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Adresse</label>
                        <input type="text" name="address" class="form-control" placeholder="Straße, PLZ, Stadt">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefon (optional)</label>
                        <input type="tel" name="tel" class="form-control">
                    </div>

                    <div id="privateField">
                        <div class="mb-3 border-start border-4 border-info ps-3">
                            <label class="form-label">Geburtsdatum</label>
                            <input type="date" name="geb_date" class="form-control">
                        </div>
                    </div>

                    <div id="companyField" class="hidden-fields">
                        <div class="mb-3 border-start border-4 border-success ps-3">
                            <label class="form-label">UID-Nummer</label>
                            <input type="text" name="uid" class="form-control" placeholder="z.B. ATU12345678">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Registrierung abschließen</button>
                        <a href="{{ url_for('user.login') }}" class="btn btn-outline-secondary">Zum Login</a>
                        <a href="/" class="btn btn-link text-muted">Zurück zum Shop</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleFields() {
            const type = document.getElementById('customerType').value;
            const privateField = document.getElementById('privateField');
            const companyField = document.getElementById('companyField');
            const nameLabel = document.getElementById('nameLabel');

            if (type === 'company') {
                privateField.classList.add('hidden-fields');
                companyField.classList.remove('hidden-fields');
                nameLabel.innerText = "Firmenname";
            } else {
                privateField.classList.remove('hidden-fields');
                companyField.classList.add('hidden-fields');
                nameLabel.innerText = "Vollständiger Name";
            }
        }
    </script>
</body>
</html>
