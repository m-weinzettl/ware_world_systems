<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarenWelt - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .login-card { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body class="bg-light">

    <div class="container">
        <div class="card login-card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h3 class="mb-0">Anmelden</h3>
            </div>
            <div class="card-body p-4">

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form action="{{ url_for('user.login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">E-Mail Adresse</label>
                        <input type="email" name="email" class="form-control" required placeholder="beispiel@mail.de">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Passwort</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Einloggen</button>
                        <a href="{{ url_for('user.register') }}" class="btn btn-outline-primary">Neues Konto erstellen</a>
                        <a href="/" class="btn btn-link text-muted">Zurück zum Shop</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
